<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    <link rel="icon" type="image/png" href="/logo.svg">
    <script>
      if (
        localStorage.plomberyTheme === 'dark' ||
        (!('plomberyTheme' in localStorage) &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <link rel="stylesheet" href="/static/executive/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <p class="app-title">Executive Dashboard</p>
            </div>
            <button id="theme-toggle" type="button" class="theme-toggle-btn">
                <!-- Sun Icon -->
                <svg id="theme-icon-sun" class="theme-icon hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
                <!-- Moon Icon -->
                <svg id="theme-icon-moon" class="theme-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            </button>
        </header>

        <main class="main-content">
            <div class="grid-layout">
                <!-- Left Panel: Reports List -->
                <div class="card reports-card">
                    <h2 class="card-title">Reports</h2>
                    <div id="reports-list" class="list-container"></div>
                </div>

                <!-- Right Panel: Report Content -->
                <div class="content-column">
                    <!-- Top: Rendered Markdown -->
                    <div class="card markdown-card">
                        <div class="card-header">
                            <h2 class="card-title">Report Content</h2>
                            <button id="download-btn" class="action-btn" style="display: none;">Download Report</button>
                        </div>
                        <div id="markdown-content" class="markdown-body">
                            <p class="placeholder-text">Select a report to view details.</p>
                        </div>
                    </div>

                    <!-- Bottom: Charts Gallery -->
                    <div class="card charts-card">
                        <h2 class="card-title">Charts</h2>
                        <div id="charts-gallery" class="gallery-container">
                            <p class="placeholder-text">No charts to display.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/executive/script.js"></script>
</body>
</html>
